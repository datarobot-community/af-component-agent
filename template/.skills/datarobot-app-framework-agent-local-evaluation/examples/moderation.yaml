# moderation.yaml
#
# Place this file at the root of the agent directory (alongside custom.py).
#
# Replace every <YOUR_JUDGE_LLM_DEPLOYMENT_ID> with a real 24-character
# DataRobot deployment ID before running tests.
#
# Required environment variables (add to .env or export before pytest):
#   DATAROBOT_ENDPOINT  — e.g. https://app.datarobot.com/api/v2
#   DATAROBOT_API_TOKEN — your DataRobot API token
#   TARGET_NAME         — output field of your deployment response (e.g. resultText)
#
# Choose the guards that match your use case and remove the rest.

timeout_sec: 60
timeout_action: block   # "score" to treat timeouts as pass during development

guards:
  # ── Agent Goal Accuracy ──────────────────────────────────────────────────
  # Recommended for all agentic workflows.
  # Measures whether the agent achieved the user's stated goal.
  - name: Agent Goal Accuracy
    type: ootb
    ootb_type: agent_goal_accuracy
    stage: response
    is_agentic: true
    llm_type: datarobot
    deployment_id: "<YOUR_JUDGE_LLM_DEPLOYMENT_ID>"
    intervention:
      action: block
      message: "Agent failed to achieve the user's goal."
      conditions:
        - comparator: lessThan
          comparand: 0.7   # Fail if accuracy score is below 70%

  # ── Faithfulness (hallucination detection) ───────────────────────────────
  # Use for RAG agents. Requires copy_citations: true and retrieved_contexts
  # to be passed to pipeline.evaluate_response().
  - name: Faithfulness
    type: ootb
    ootb_type: faithfulness
    stage: response
    copy_citations: true
    llm_type: datarobot
    deployment_id: "<YOUR_JUDGE_LLM_DEPLOYMENT_ID>"
    intervention:
      action: block
      message: "Hallucination detected by LLM judge."
      conditions:
        - comparator: equals
          comparand: 0.0

  # ── Task Adherence ───────────────────────────────────────────────────────
  # Use for instruction-following agents.
  # Measures how closely the response follows the prompt instructions.
  - name: Task Adherence
    type: ootb
    ootb_type: task_adherence
    stage: response
    llm_type: datarobot
    deployment_id: "<YOUR_JUDGE_LLM_DEPLOYMENT_ID>"
    intervention:
      action: block
      message: "Agent did not complete the requested task."
      conditions:
        - comparator: lessThan
          comparand: 0.5

