---
name: af-component-agent E2E
on:
  workflow_dispatch:
    inputs:
      frameworks:
        description: "Comma-separated frameworks to run (empty = all: base,crewai,langgraph,llamaindex,nat)"
        required: false
        default: ""
      run_deployment_tests:
        description: "Run the deploy phase (1) or custom-model only (0)"
        required: false
        default: "1"
        type: choice
        options: ["1", "0"]
      datarobot_endpoint:
        description: "Override DataRobot endpoint (empty = use integration secret)"
        required: false
        default: ""
  push:
    branches: ["main"]
    paths:
      - "template/**"
      - "fixtures/**"
      - "tests/e2e/**"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/afcomponentagent-e2e-test.yaml"
  pull_request:
    branches: ["main"]
    paths:
      - "template/**"
      - "fixtures/**"
      - "tests/e2e/**"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/afcomponentagent-e2e-test.yaml"
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true
permissions:
  contents: read
jobs:
  setup:
    name: "Resolve framework matrix"
    runs-on: "ubuntu-latest"
    outputs:
      matrix: ${{ steps.resolve.outputs.matrix }}
    steps:
      - name: Resolve matrix
        id: resolve
        shell: bash
        env:
          FRAMEWORKS: ${{ github.event.inputs.frameworks }}
        run: |
          set -euo pipefail
          ALL='["base","crewai","langgraph","llamaindex","nat"]'
          if [ -z "${FRAMEWORKS:-}" ]; then
            MATRIX="$ALL"
          else
            MATRIX=$(printf '%s' "$FRAMEWORKS" \
              | jq -Rc 'split(",") | map(gsub("^\\s+|\\s+$";"")) | map(select(length>0))')
            INVALID=$(printf '%s' "$MATRIX" \
              | jq -c --argjson all "$ALL" 'map(select(. as $f | $all | index($f) | not))')
            if [ "$INVALID" != "[]" ]; then
              echo "::error::Unknown framework(s): $INVALID. Valid: $ALL"
              exit 1
            fi
          fi
          echo "Resolved matrix: $MATRIX"
          echo "matrix=$MATRIX" >> "$GITHUB_OUTPUT"
  e2e:
    name: "E2E / ${{ matrix.framework }}"
    needs: setup
    # Skip on fork PRs so integration secrets are never reachable from
    # attacker-controlled code. Same-repo branches, pushes to main, and
    # workflow_dispatch still run normally.
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork == false
    runs-on: "ubuntu-latest"
    environment: integration
    container:
      image: ghcr.io/astral-sh/uv:python3.11-bookworm
    timeout-minutes: 75
    strategy:
      fail-fast: false
      matrix:
        framework: ${{ fromJSON(needs.setup.outputs.matrix) }}
    steps:
      - name: Checkout
        uses: "actions/checkout@v6"
      - name: Setup caching
        uses: ./.github/actions/setup-caching
        with:
          python-version: python3.11
          cache-key-suffix: e2e-${{ matrix.framework }}
      - name: Run E2E
        shell: bash
        env:
          UV_CACHE_DIR: /.uv_cache
          RUN_E2E: "1"
          E2E_AGENT_FRAMEWORKS: ${{ matrix.framework }}
          RUN_AGENT_DEPLOYMENT_TESTS: ${{ github.event.inputs.run_deployment_tests || '1' }}
          ENABLE_DRAGENT_SERVER: "true"
          LLM_DEFAULT_MODEL: "datarobot/azure/gpt-5-mini-2025-08-07"
          E2E_PULUMI_STACK: af-component-agent-e2e-${{ matrix.framework }}-${{ github.run_id }}-${{ github.run_attempt }}
          DATAROBOT_ENDPOINT: ${{ github.event.inputs.datarobot_endpoint || secrets.DATAROBOT_ENDPOINT }}
          DATAROBOT_API_TOKEN: ${{ secrets.DATAROBOT_API_TOKEN }}
        run: |
          uv run --all-extras pytest --import-mode=importlib -vv -s ./tests/e2e/test_agent_e2e.py
