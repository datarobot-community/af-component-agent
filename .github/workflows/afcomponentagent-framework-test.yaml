---
name: af-component-agent Frameworks
on:
  push:
    branches: ["main"]
    paths:
      - "fixtures/**"
      - "template/**"
      - ".github/workflows/afcomponentagent-framework-test.yaml"
  pull_request:
    branches: ["main"]
    paths:
      - "fixtures/**"
      - "template/**"
      - ".github/workflows/afcomponentagent-framework-test.yaml"
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true
jobs:
  test-frameworks:
    name: "Test ${{ matrix.framework.agent_name }} (${{ matrix.python }})"
    runs-on: "ubuntu-latest"
    container:
      image: ghcr.io/astral-sh/uv:${{ matrix.python }}-bookworm
    strategy:
      fail-fast: false
      matrix:
        python: [python3.11, python3.12, python3.13]
        framework:
          - name: base
            agent_name: agent_generic_base
            use_memory: "none"
          - name: base
            agent_name: agent_with_memory
            use_memory: "mem0"
            apply_memory_component: true
          - name: crewai
            agent_name: agent_crewai
            use_memory: "none"
          - name: langgraph
            agent_name: agent_langgraph
            use_memory: "none"
          - name: llamaindex
            agent_name: agent_llamaindex
            use_memory: "none"
          - name: nat
            agent_name: agent_nat
            use_memory: "none"
    steps:
      - name: Checkout
        uses: "actions/checkout@v6"
      - name: Checkout memory component
        if: matrix.framework.apply_memory_component == true
        uses: actions/checkout@v6
        with:
          repository: datarobot-community/af-component-memory
          path: af-component-memory
      - name: Render template
        uses: datarobot-oss/copier-template-validator@main
        with:
          working-directory: .
          rendered-dir: ./rendered
          copier-args: >-
            --data agent_app_name=${{ matrix.framework.agent_name }}
            --data agent_template_framework=${{ matrix.framework.name }}
            --data base_answers_file=.datarobot/answers/base.yml
            ${{ matrix.framework.apply_memory_component == true && '--data use_memory_provider=mem0' || '' }}
      - name: Apply memory component
        if: matrix.framework.apply_memory_component == true
        shell: sh
        run: |
          cp ./fixtures/.datarobot/answers/memory-memory.yml ./rendered/${{ matrix.framework.agent_name }}/.datarobot/answers/memory-memory.yml
          cp ./fixtures/.datarobot/answers/agent-agent.yml ./rendered/${{ matrix.framework.agent_name }}/.datarobot/answers/agent-agent.yml
          uvx copier copy ./af-component-memory ./rendered/${{ matrix.framework.agent_name }} --defaults \
            --data memory_app_name=memory \
            --data use_memory_provider=mem0 \
            --data agent_app_name=agent \
            --data agent_template_framework=${{ matrix.framework.name }} \
            --data agent_answers_file=.datarobot/answers/agent-agent.yml \
            --data base_answers_file=.datarobot/answers/base.yml
        env:
          UV_CACHE_DIR: /.uv_cache
      - name: Check lock file
        shell: sh
        working-directory: ./rendered/${{ matrix.framework.agent_name }}
        run: |
          echo "Checking lock file. If it fails, see to docs/development.md for instructions on how to update the lock file."
          echo "And if it still fails for some reason, do uv lock here to see what is causing the issue."
          uv lock --check
        env:
          UV_CACHE_DIR: /.uv_cache
      - name: Install dependencies
        shell: sh
        working-directory: ./rendered/${{ matrix.framework.agent_name }}
        run: |
          uvx --from go-task-bin task install
        env:
          UV_CACHE_DIR: /.uv_cache
      - name: License Header Check
        if: matrix.python == 'python3.11'
        uses: apache/skywalking-eyes/header@main
        with:
          config: .github/.licenserc.yaml
      - name: Run linter
        shell: sh
        working-directory: ./rendered/${{ matrix.framework.agent_name }}
        run: |
          uvx --from go-task-bin task lint-check
        env:
          UV_CACHE_DIR: /.uv_cache
      - name: Run unit tests
        shell: sh
        working-directory: ./rendered/${{ matrix.framework.agent_name }}
        run: |
          uvx --from go-task-bin task test-coverage
        env:
          UV_CACHE_DIR: /.uv_cache
          LLM_DEFAULT_MODEL: "datarobot/azure/gpt-5-mini-2025-08-07"
      - name: Install agentic playground dependencies
        shell: sh
        working-directory: ./rendered/${{ matrix.framework.agent_name }}
        run: |
          uv sync --extra agentic_playground --extra dev
        env:
          UV_CACHE_DIR: /.uv_cache
      - name: Run unit tests with agentic playground dependencies
        shell: sh
        working-directory: ./rendered/${{ matrix.framework.agent_name }}
        run: |
          uvx --from go-task-bin task test-coverage
        env:
          UV_CACHE_DIR: /.uv_cache
          LLM_DEFAULT_MODEL: "datarobot/azure/gpt-5-mini-2025-08-07"
