---
name: af-component-agent Smoke Tests
on:
  workflow_dispatch:

jobs:
  smoke-test:
    name: "Smoke / ${{ matrix.framework }} / ${{ matrix.model.label }}"
    runs-on: "ubuntu-latest"
    container:
      image: ghcr.io/astral-sh/uv:python3.11-bookworm
    strategy:
      fail-fast: false
      matrix:
        framework: [base, crewai, langgraph, llamaindex, nat]
        model:
          - label: gpt
            id: "datarobot/azure/gpt-5-mini-2025-08-07"
          # Add more providers below once tokens are available in GitHub secrets:
          # - label: sonnet
          #   id: "datarobot/anthropic/claude-sonnet-..."
          # - label: gemini
          #   id: "datarobot/google/gemini-..."
    steps:
      - name: Checkout
        uses: "actions/checkout@v6"
      - name: Setup caching
        uses: ./.github/actions/setup-caching
        with:
          python-version: python3.11
          cache-key-suffix: smoke-${{ matrix.framework }}-${{ matrix.model.label }}
      - name: Render template
        uses: ./.github/actions/render-copier-instance
        with:
          copier-args: "--defaults --data agent_template_framework=${{ matrix.framework }}"
      - name: Install agent dependencies
        shell: sh
        working-directory: ./rendered
        run: uvx --from go-task-bin task agent:install
        env:
          UV_CACHE_DIR: /.uv_cache
      - name: Write credentials
        shell: sh
        working-directory: ./rendered
        run: |
          printf 'DATAROBOT_API_TOKEN=%s\n' "$DATAROBOT_API_TOKEN" > .env
          printf 'DATAROBOT_ENDPOINT=%s\n' "$DATAROBOT_ENDPOINT" >> .env
          if [ "$FRAMEWORK" = "crewai" ]; then
            echo "CREWAI_TESTING=true" >> .env
          fi
        env:
          DATAROBOT_API_TOKEN: ${{ secrets.DATAROBOT_API_TOKEN }}
          DATAROBOT_ENDPOINT: ${{ secrets.DATAROBOT_ENDPOINT }}
          FRAMEWORK: ${{ matrix.framework }}
      - name: Run smoke test
        shell: sh
        working-directory: ./rendered
        run: |
          uvx --from go-task-bin task agent:cli START_DEV=1 -- \
            execute \
            --show_output \
            --user_prompt "Reply with one word: OK." \
            > ./agent/output.log 2>&1
          cat ./agent/output.log
        env:
          UV_CACHE_DIR: /.uv_cache
          LLM_DEFAULT_MODEL: ${{ matrix.model.id }}
      - name: Validate response
        shell: sh
        working-directory: ./rendered
        run: |
          if grep -qi "^error:" ./agent/output.log || grep -q "failed to obtain agent chat response" ./agent/output.log; then
            echo "FAIL: agent returned an error response"
            exit 1
          fi
          if ! grep -q "Execution result:" ./agent/output.log; then
            echo "FAIL: no execution result found in output"
            exit 1
          fi
          echo "PASS: smoke test succeeded"
      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-logs-${{ matrix.framework }}-${{ matrix.model.label }}
          path: ./rendered/agent/output.log
